<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Page Not Found | Master Calisthenics India</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" href="assets/logo.png">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline';">
  <meta name="referrer" content="strict-origin-when-cross-origin">

  <style media="screen">
    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    #message {
      background: #1a1a1a;
      max-width: 420px;
      margin: 0 auto;
      padding: 40px 32px;
      border-radius: 12px;
      text-align: center;
      border: 1px solid #333;
    }

    #message h2 {
      color: #00e676;
      font-weight: bold;
      font-size: 64px;
      margin: 0 0 8px;
    }

    #message h1 {
      font-size: 22px;
      font-weight: 600;
      color: #fff;
      margin: 0 0 16px;
    }

    #message p {
      line-height: 1.6;
      margin: 16px 0 24px;
      font-size: 15px;
      color: #999;
    }

    #message a {
      display: inline-block;
      text-align: center;
      background: #00e676;
      color: #000;
      text-decoration: none;
      padding: 12px 32px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
      transition: background 0.3s;
    }

    #message a:hover {
      background: #00c853;
    }
  </style>
</head>

<body>
  <div id="message">
    <h2>404</h2>
    <h1>Page Not Found</h1>
    <p>The page you're looking for doesn't exist. Head back to the homepage or book a free trial session.</p>
    <a href="/">Go to Homepage</a>
  </div>
</body>

</html>
